server.port=8087
spring.application.name=notification-service


spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT_NOT}/${DB_NAME_NOT}
spring.datasource.username=${DB_USERNAME_NOT}
spring.datasource.password=${DB_PASSWORD_NOT}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


spring.kafka.bootstrap-servers=${KAFKA_HOST}:${KAFKA_PORT}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.properties.spring.json.trusted.packages=com.sorokaandriy.auth_service
spring.kafka.consumer.properties.spring.json.type.mapping=com.sorokaandriy.auth_service.dto.UserRegisteredEvent:com.sorokaandriy.notification_service.dto.UserRegisteredEvent
spring.kafka.consumer.auto-offset-reset=earliest
kafka.topics.user-registered=user.registered


spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


app.mail.from=${MAIL_FROM}
app.verification-url=http://localhost:3000/verify?token=

logging.level.com.sorokaandriy.notification_service=DEBUG
